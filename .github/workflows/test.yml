name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        # Windows exercises the real MetaTrader5 import path; Linux (the
        # all-in-one Docker / bridge story) runs the same suite via the typed
        # fakes, catching import/platform-guard regressions the Windows leg can't.
        os: [windows-latest, ubuntu-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v6

      - name: Set up uv with Python ${{ matrix.python-version }}
        uses: astral-sh/setup-uv@v8.1.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --extra dev --locked

      - name: Run unit tests
        run: uv run pytest -m "not integration" -v

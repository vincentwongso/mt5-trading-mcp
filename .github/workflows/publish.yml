name: publish

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

# Least privilege by default; the publish job opts into id-token explicitly.
permissions:
  contents: read

jobs:
  build:
    name: Build sdist + wheel
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          python-version: "3.12"

      - name: Build distributions
        run: uv build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # Only ever publish from a release tag — a manual run on a branch is refused.
    if: github.ref_type == 'tag'
    # Deploys into the protected 'pypi' environment. Add a required reviewer in
    # repo Settings -> Environments -> pypi to gate every publish behind manual
    # approval, and restrict its deployment tags to "v*".
    environment:
      name: pypi
      url: https://pypi.org/p/mt5-trading-mcp
    permissions:
      id-token: write   # OIDC token for PyPI Trusted Publishing (no API token)
      contents: read
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      # Authentication is via OIDC Trusted Publishing — no username/password/token.
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          attestations: true   # PEP 740 provenance
          skip-existing: true
